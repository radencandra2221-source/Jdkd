<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ML Cheat - Kill Ping & Damage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 20%, #2d0a0a, #000000 80%);
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid #ff2d2d50;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(255, 0, 0, 0.2), 0 0 0 1px rgba(255, 50, 50, 0.2);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: all 0.3s;
    }

    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 12px #ff4d4d);
      margin-bottom: 5px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff3b3b, #ff8c8c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 10px #ff000080;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #bbb;
      font-size: 0.85rem;
      font-style: italic;
      border-bottom: 1px dashed #ff4d4d50;
      padding-bottom: 5px;
    }

    .panel {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 20px 18px;
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.7);
    }

    .feature {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f0f0f;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid #2a2a2a;
    }

    .feature-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #ddd;
      font-size: 1.1rem;
    }

    .feature-label span.icon {
      font-size: 1.6rem;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 58px;
      height: 30px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3a3a3a;
      transition: 0.3s;
      border-radius: 30px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }

    input:checked + .slider {
      background-color: #ff2d2d;
      box-shadow: 0 0 15px #ff2d2d;
    }

    input:checked + .slider:before {
      transform: translateX(28px);
      background-color: #fff;
    }

    .slider-text {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      font-weight: bold;
      color: #fff;
      pointer-events: none;
    }

    .slider-text.off {
      left: 8px;
      opacity: 1;
      transition: 0.2s;
    }

    .slider-text.on {
      right: 8px;
      opacity: 0;
      transition: 0.2s;
      color: #ffe0e0;
    }

    input:checked ~ .slider-text.off {
      opacity: 0;
    }

    input:checked ~ .slider-text.on {
      opacity: 1;
    }

    .damage-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .damage-label {
      font-weight: 600;
      color: #ffbbbb;
      font-size: 1rem;
    }

    input[type=range] {
      width: 120px;
      accent-color: #ff2d2d;
      height: 8px;
      border-radius: 5px;
      background: #2a2a2a;
    }

    .damage-value {
      background: #ff2d2d20;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      color: #ff6b6b;
      min-width: 60px;
      text-align: center;
      border: 1px solid #ff2d2d60;
    }

    .execute-btn {
      background: linear-gradient(145deg, #b71c1c, #d32f2f);
      border: none;
      border-radius: 40px;
      padding: 16px 20px;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: white;
      text-transform: uppercase;
      box-shadow: 0 10px 20px rgba(255, 0, 0, 0.4), 0 0 15px #ff0000;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid #ff6666;
    }

    .execute-btn:hover {
      background: linear-gradient(145deg, #d32f2f, #e53935);
      box-shadow: 0 15px 25px rgba(255, 0, 0, 0.6), 0 0 25px #ff4d4d;
      transform: scale(1.02);
    }

    .execute-btn:active {
      transform: scale(0.97);
    }

    .execute-btn:disabled {
      opacity: 0.5;
      filter: grayscale(30%);
      pointer-events: none;
    }

    .console {
      background: #0b0b0b;
      border-radius: 16px;
      border: 1px solid #444;
      padding: 15px;
      font-family: 'Courier New', monospace;
      color: #0f0;
      font-size: 0.9rem;
      height: 130px;
      overflow-y: auto;
      box-shadow: inset 0 0 20px #000000;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .log-line {
      display: flex;
      gap: 6px;
    }

    .log-time {
      color: #888;
    }

    .log-text {
      color: #adff2f;
    }

    .log-error {
      color: #ff6b6b;
    }

    .progress-container {
      width: 100%;
      height: 8px;
      background: #222;
      border-radius: 10px;
      margin: 10px 0 5px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff2d2d, #ff8c8c);
      border-radius: 10px;
      box-shadow: 0 0 20px #ff0000;
      transition: width 0.1s ease;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #555;
      text-align: center;
      margin-top: 4px;
      border-top: 1px solid #2a2a2a;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎮💀</div>
      <h1>ML CHEAT TOOL</h1>
      <div class="subtitle">Kill Ping & Damage Hack v4.2</div>
    </div>

    <div class="panel">
      <div class="feature">
        <div class="feature-label">
          <span class="icon">📶</span> Kill Ping Lawan
        </div>
        <label class="switch">
          <input type="checkbox" id="killPingToggle">
          <span class="slider"></span>
          <span class="slider-text off">OFF</span>
          <span class="slider-text on">ON</span>
        </label>
      </div>

      <div class="feature">
        <div class="feature-label">
          <span class="icon">⚔️</span> Damage Multiplier
        </div>
        <div class="damage-control">
          <input type="range" id="damageSlider" min="2" max="20" value="5" step="0.5">
          <span class="damage-value" id="damageDisplay">x5.0</span>
        </div>
      </div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <button class="execute-btn" id="executeBtn">
        <span>🔥</span> AKTIFKAN CHEAT <span>🔥</span>
      </button>

      <div class="console" id="console">
        <div class="log-line">
          <span class="log-time">[SYS]</span>
          <span class="log-text">Menunggu perintah...</span>
        </div>
      </div>
    </div>

    <div class="footer-note">
      🔒 Koneksi terenkripsi | Server aktif
    </div>
  </div>

  <script>
    (function () {
      const killPingToggle = document.getElementById('killPingToggle');
      const damageSlider = document.getElementById('damageSlider');
      const damageDisplay = document.getElementById('damageDisplay');
      const executeBtn = document.getElementById('executeBtn');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const consoleEl = document.getElementById('console');

      let isExecuting = false;

      damageSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value).toFixed(1);
        damageDisplay.textContent = `x${val}`;
      });

      function addLog(message, type = 'info') {
        const line = document.createElement('div');
        line.className = 'log-line';
        const now = new Date();
        const timeStr = now.toLocaleTimeString('id-ID', { hour12: false });
        const timeSpan = document.createElement('span');
        timeSpan.className = 'log-time';
        timeSpan.textContent = `[${timeStr}]`;
        const textSpan = document.createElement('span');
        textSpan.className = type === 'error' ? 'log-error' : 'log-text';
        textSpan.textContent = message;
        line.appendChild(timeSpan);
        line.appendChild(textSpan);
        consoleEl.appendChild(line);
        consoleEl.scrollTop = consoleEl.scrollHeight;
        if (consoleEl.children.length > 8) {
          consoleEl.removeChild(consoleEl.children[0]);
        }
      }

      // Fungsi buka Mobile Legends langsung (Android)
      function openMobileLegends() {
        const ua = navigator.userAgent || '';
        if (/android/i.test(ua)) {
          // Coba buka langsung lewat skema mlbb://
          const startTime = Date.now();
          window.location.href = 'mlbb://';

          // Fallback ke Play Store jika aplikasi tidak terpasang (setelah 2 detik)
          setTimeout(() => {
            // Hanya redirect jika halaman masih terlihat (tidak berpindah ke aplikasi)
            if (document.hidden === false && Date.now() - startTime < 2200) {
              window.location.href = 'market://details?id=com.mobile.legends';
            }
          }, 2000);
        } else {
          // Untuk desktop atau iOS, beri pesan manual
          addLog("ℹ️ Silakan buka Mobile Legends secara manual di perangkat Anda.");
        }
      }

      function simulateProgress(duration = 2500, callback) {
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        let start = null;
        function step(timestamp) {
          if (!start) start = timestamp;
          const elapsed = timestamp - start;
          const progress = Math.min(elapsed / duration, 1);
          progressBar.style.width = (progress * 100) + '%';
          if (progress < 1) {
            window.requestAnimationFrame(step);
          } else {
            if (callback) callback();
            setTimeout(() => {
              progressContainer.style.display = 'none';
              progressBar.style.width = '0%';
            }, 400);
          }
        }
        window.requestAnimationFrame(step);
      }

      function executeCheat() {
        if (isExecuting) {
          addLog("⛔ Proses sedang berjalan, harap tunggu...", "error");
          return;
        }

        const pingActive = killPingToggle.checked;
        const damageVal = parseFloat(damageSlider.value).toFixed(1);

        if (!pingActive && damageVal <= 1.0) {
          addLog("❌ Aktifkan minimal satu cheat (Kill Ping atau Damage > x1)", "error");
          return;
        }

        isExecuting = true;
        executeBtn.disabled = true;
        addLog("🔍 Mendeteksi proses Mobile Legends...");

        setTimeout(() => {
          addLog("📡 Menghubungkan ke server cheat...");
        }, 600);

        setTimeout(() => {
          addLog("🔐 Autentikasi berhasil, memuat modul...");
        }, 1200);

        setTimeout(() => {
          simulateProgress(2800, () => {
            if (pingActive) {
              addLog("💀 Ping lawan berhasil dimatikan!");
            }
            if (damageVal > 1.0) {
              addLog("⚡ Damage multiplier x" + damageVal + " aktif!");
            }
            addLog("✅ Cheat berhasil diaktifkan! Semua fitur berjalan.");
            addLog("🟢 Status: Terhubung & Aktif");

            // Buka Mobile Legends langsung
            addLog("📱 Membuka Mobile Legends...");
            setTimeout(() => {
              openMobileLegends();
            }, 800);

            isExecuting = false;
            executeBtn.disabled = false;
          });
        }, 1800);
      }

      executeBtn.addEventListener('click', executeCheat);

      setTimeout(() => {
        addLog("🟢 Server online, siap menerima perintah.");
        addLog("🔧 Pilih cheat lalu tekan 'AKTIFKAN CHEAT'");
      }, 300);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.activeElement !== damageSlider && !isExecuting) {
          e.preventDefault();
          executeCheat();
        }
      });

      killPingToggle.addEventListener('change', () => {
        if (killPingToggle.checked && parseFloat(damageSlider.value) >= 10) {
          addLog("💥 Kombo mematikan! Ping + Damage ekstrem siap digunakan.");
        }
      });

      damageSlider.addEventListener('change', () => {
        if (killPingToggle.checked && parseFloat(damageSlider.value) >= 15) {
          addLog("🔥 Damage maksimum! Musuh akan lenyap dalam sekejap.");
        }
      });
    })();
  </script>
</body>
</html>
