<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #3b82f6;
            border-radius: 50%;
            margin-right: 5px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        .chat-container {
            height: calc(100vh - 180px);
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">Asisten AI Cerdas</h1>
            </div>
            <span class="text-xs font-medium text-green-600 bg-green-100 px-2 py-1 rounded-full uppercase">Gemini 2.5 Flash</span>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="max-w-4xl mx-auto p-4">
        <div id="chat-box" class="chat-container overflow-y-auto space-y-4 pb-4 pr-2">
            <!-- Pesan Sambutan -->
            <div class="flex justify-start">
                <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none p-4 max-w-[85%] shadow-sm">
                    <p class="text-sm leading-relaxed">Halo! Saya adalah AI asisten Anda. Silakan tanyakan apa saja, saya akan mencoba menjawab dengan nyambung dan akurat.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4">
        <div class="max-w-4xl mx-auto">
            <form id="chat-form" class="flex items-center space-x-2">
                <textarea 
                    id="user-input" 
                    rows="1" 
                    class="flex-1 bg-slate-100 border-none rounded-2xl px-4 py-3 focus:ring-2 focus:ring-blue-500 resize-none outline-none text-sm"
                    placeholder="Ketik pertanyaan Anda di sini..."
                    required
                ></textarea>
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-2xl transition-colors duration-200 disabled:opacity-50"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
            <p class="text-[10px] text-center text-slate-400 mt-2">AI dapat membuat kesalahan. Harap periksa informasi penting.</p>
        </div>
    </footer>

    <script>
        // API Configuration
        const apiKey = ""; // Kunci akan disediakan oleh environment runtime
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Fungsi untuk menambahkan pesan ke UI
        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const content = document.createElement('div');
            content.className = role === 'user' 
                ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none p-4 max-w-[85%] shadow-sm'
                : 'bg-white border border-slate-200 rounded-2xl rounded-tl-none p-4 max-w-[85%] shadow-sm';
            
            const messageText = document.createElement('p');
            messageText.className = 'text-sm leading-relaxed';
            messageText.innerText = text;
            
            content.appendChild(messageText);
            wrapper.appendChild(content);
            chatBox.appendChild(wrapper);
            
            // Scroll ke bawah
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Fungsi Loading Indicator
        function showLoading() {
            const loader = document.createElement('div');
            loader.id = 'ai-loading';
            loader.className = 'flex justify-start';
            loader.innerHTML = `
                <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none p-4 shadow-sm flex items-center">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatBox.appendChild(loader);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeLoading() {
            const loader = document.getElementById('ai-loading');
            if (loader) loader.remove();
        }

        // Exponential Backoff Fetch
        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    
                    if (response.status === 429 || response.status >= 500) {
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        continue;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                }
            }
        }

        // Form Submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // Update UI User
            appendMessage('user', prompt);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Start Loading
            sendBtn.disabled = true;
            showLoading();

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [{ text: prompt }]
                }],
                systemInstruction: {
                    parts: [{ text: "Anda adalah asisten AI yang ramah dan cerdas. Jawablah dalam Bahasa Indonesia yang alami dan mudah dimengerti." }]
                }
            };

            try {
                const data = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, saya tidak bisa memproses permintaan tersebut.";
                removeLoading();
                appendMessage('ai', aiResponse);

            } catch (error) {
                console.error(error);
                removeLoading();
                appendMessage('ai', "Sistem sedang sibuk atau terjadi kesalahan koneksi. Silakan coba beberapa saat lagi.");
            } finally {
                sendBtn.disabled = false;
            }
        });

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
